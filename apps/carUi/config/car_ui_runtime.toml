# Car UI runtime composition
#
# Radio domain configuration files are resolved relative to:
#   PROJECT_ROOT/config/radio
#
# This file selects which runtime components are assembled. Individual radio
# frequencies, modes, ranges, and presets remain in their existing JSON files.

[runtime]
remote_display = ":2"

[rigctl]
host = "127.0.0.1"
port = 4532

[input.rotary_encoders]
volume_index = 0

[[input.rotary_encoders.devices]]
driver = "seesaw"
address = 0x36

[[input.rotary_encoders.devices]]
driver = "seesaw"
address = 0x37

[[input.rotary_encoders.devices]]
driver = "seesaw"
address = 0x38

[[radios]]
key = "fm_radio"
config = "fm_radio.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "airband"
config = "airband_am.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "weather_band"
config = "weather_band.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "police_fire"
config = "police_fire.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "railroad"
config = "railroad.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "ham_2m"
config = "ham_2m.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "ham_70cm"
config = "ham_70cm.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "gmrs"
config = "gmrs.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "frs"
config = "frs.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "marine"
config = "marine.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[[radios]]
key = "cb"
config = "cb.json"
backend = "rigctl"
launcher = "sdrpp"
enabled = true

[auxiliary.adsb]
enabled = true
url = "http://127.0.0.1/tar1090"
close_existing_display_apps = true

[auxiliary.weather_dashboard]
enabled = true
